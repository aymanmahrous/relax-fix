<form id="form">
  <input id="name" placeholder="الاسم" required><br><br>
  <input id="phone" placeholder="رقم الهاتف" required><br><br>
  <input id="service" placeholder="الخدمة" required><br><br>
  <textarea id="notes" placeholder="ملاحظات"></textarea><br><br>
  <button type="submit">إرسال الطلب</button>
</form>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nmzxrjdxvmmzzmajrskm.supabase.co",
  "sb_publishable_qXOPVaD5_f60qf1UbYrm2A_sH9c0lW5"
);

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const service = document.getElementById("service").value;
  const notes = document.getElementById("notes").value;

  const { error } = await supabase.from("requests").insert([
    { name, phone, service, notes }
  ]);

  if (error) {
    alert("خطأ: " + error.message);
  } else {
    alert("تم إرسال الطلب ✅");
    document.getElementById("form").reset();
  }
});
</script>
