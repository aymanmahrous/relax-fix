<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relax Fix 2026</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#0b0b0b;
    color:white;
    text-align:center;
}
.container {
    padding:20px;
}
h1 {
    color:#00ff9c;
}
button {
    padding:15px;
    margin:10px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
.whatsapp {background:#25D366;color:white;}
.call {background:#0ea5e9;color:white;}
.box {
    background:#1a1a1a;
    padding:15px;
    margin:10px;
    border-radius:10px;
}
input,select,textarea {
    width:90%;
    padding:12px;
    margin:10px;
    border-radius:6px;
    border:none;
}
</style>

</head>
<body>

<div class="container">

<h1>🔥 RELAX FIX</h1>
<p>أفضل خدمات الصيانة في أبوظبي</p>

<a href="tel:0588259848">
<button class="call">📞 اتصل الآن</button>
</a>

<button class="whatsapp" onclick="openWhats()">💬 واتساب مباشر</button>

<div class="box">
❄️ صيانة تكييف<br>
💧 تنظيف خزانات<br>
🪳 مكافحة حشرات<br>
🔧 سباكة وكهرباء
</div>

<h2>احجز الخدمة الآن</h2>

<input id="name" placeholder="الاسم">
<input id="phone" placeholder="رقم الهاتف">

<select id="service">
<option>صيانة التكييف</option>
<option>تنظيف المكيفات</option>
<option>تبريد الخزانات</option>
<option>تنظيف المنازل</option>
<option>مكافحة الحشرات</option>
<option>سباكة وكهرباء</option>
</select>

<textarea id="notes" placeholder="ملاحظات"></textarea>

<button class="whatsapp" onclick="sendOrder()">إرسال عبر واتساب</button>

</div>

<script>

function openWhats(){
    window.open("https://wa.me/971588259848","_blank");
}

function sendOrder(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let service = document.getElementById("service").value;
    let notes = document.getElementById("notes").value;

    if(!name || !phone){
        alert("اكتب الاسم ورقم الهاتف");
        return;
    }

    let msg = `طلب جديد Relax Fix
الاسم: ${name}
رقم الهاتف: ${phone}
الخدمة: ${service}
ملاحظات: ${notes}`;

    let url = "https://wa.me/971588259848?text=" + encodeURIComponent(msg);
    window.open(url, "_blank");

    // حفظ الطلب محلي
    let orders = JSON.parse(localStorage.getItem("orders") || "[]");
    orders.push({name,phone,service,notes});
    localStorage.setItem("orders", JSON.stringify(orders));

    alert("تم إرسال الطلب بنجاح");
}

</script>

</body>
</html>
