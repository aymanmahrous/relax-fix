<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<style>
body{background:#111;color:#fff;font-family:Arial;text-align:center;padding:20px}
input{padding:10px;border-radius:8px}
button{padding:10px;background:#27e0ff;border:none;border-radius:8px}
.card{background:#222;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<h1>Dashboard</h1>

<input id="pass" placeholder="كلمة المرور">
<button onclick="load()">فتح</button>

<div id="data"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nmzxrjdxvmmzzmajrskm.supabase.co",
  "sb_publishable_qXOPVaD5_f60qf1UbYrm2A_sH9c0lW5"
);

async function load(){
  let pass = document.getElementById("pass").value;

  if(pass !== "123456"){
    alert("كلمة المرور غلط");
    return;
  }

  let { data } = await supabase.from("requests").select("*");

  let html = "";

  data.forEach(x=>{
    html += "<div class='card'>";
    html += "<b>" + x.name + "</b><br>";
    html += x.phone + "<br>";
    html += x.service + "<br>";
    html += x.notes + "<br>";
    html += "</div>";
  });

  document.getElementById("data").innerHTML = html;
}
</script>

</body>
</html>
