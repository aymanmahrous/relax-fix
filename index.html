<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Relax Fix Test</title>
</head>
<body style="background:#111;color:white;font-family:Arial;padding:30px">

<h1>Relax Fix - إرسال طلب</h1>

<form id="form">
  <input id="name" placeholder="الاسم" required><br><br>
  <input id="phone" placeholder="رقم الهاتف" required><br><br>
  <input id="service" placeholder="الخدمة" required><br><br>
  <textarea id="notes" placeholder="ملاحظات"></textarea><br><br>
  <button type="submit">إرسال الطلب</button>
</form>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://nmzxrjdxvmmzzmajrskm.supabase.co",
  "sb_publishable_qXOPVaD5_f60qf1UbYrm2A_sH9c0lW5"
);

document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const { error } = await supabase.from("requests").insert([{
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    service: document.getElementById("service").value,
    notes: document.getElementById("notes").value,
    status: "new"
  }]);

  if (error) {
    alert("خطأ: " + error.message);
  } else {
    alert("تم إرسال الطلب ✅");
  }
});
</script>

</body>
</html>
